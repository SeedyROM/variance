syntax = "proto3";

package variance.messaging.v1;

// Direct message (1-on-1)
message DirectMessage {
  // ULID for chronological sorting
  string id = 1;

  // Sender/recipient DIDs
  string sender_did = 2;
  string recipient_did = 3;

  // Serialized Olm message body (from OlmMessage::to_parts().1)
  bytes ciphertext = 4;

  // Olm message type (from OlmMessage::to_parts().0 as uint32)
  // 0 = PreKey (first message), 1 = Normal
  uint32 olm_message_type = 5;

  // Ed25519 signature of (id + sender_did + recipient_did + ciphertext + olm_message_type + timestamp)
  bytes signature = 6;

  // Unix timestamp (milliseconds)
  int64 timestamp = 7;

  // Message type
  MessageType type = 8;

  // Optional reply reference
  optional string reply_to = 9;

  // Sender's Curve25519 identity key (32 bytes).
  // Present on PreKey messages so the recipient can call create_inbound_session().
  optional bytes sender_identity_key = 10;
}

message GroupMessage {
  string id = 1;
  string sender_did = 2;
  string group_id = 3;

  reserved 4, 5, 6, 10;
  reserved "ciphertext", "nonce", "signature", "key_version";

  int64 timestamp = 7;
  MessageType type = 8;
  optional string reply_to = 9;

  // MLS (RFC 9420) ciphertext — TLS-serialized MlsMessageOut.
  bytes mls_ciphertext = 11;
}

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_TEXT = 1;
  MESSAGE_TYPE_IMAGE = 2;
  MESSAGE_TYPE_FILE = 3;
  MESSAGE_TYPE_AUDIO = 4;
  MESSAGE_TYPE_VIDEO = 5;
}

// Decrypted message content (after decryption)
message MessageContent {
  string text = 1;
  repeated Attachment attachments = 2;
  repeated string mentions = 3; // DIDs mentioned
  optional string reply_to = 4;
  map<string, string> metadata = 5;
}

message Attachment {
  AttachmentType type = 1;
  string cid = 2; // IPFS CID
  string name = 3;
  uint64 size = 4;
  string mime_type = 5;
  optional string thumbnail_cid = 6;
}

enum AttachmentType {
  ATTACHMENT_TYPE_UNSPECIFIED = 0;
  ATTACHMENT_TYPE_IMAGE = 1;
  ATTACHMENT_TYPE_FILE = 2;
  ATTACHMENT_TYPE_AUDIO = 3;
  ATTACHMENT_TYPE_VIDEO = 4;
}

// Read receipts (direct messages)
message ReadReceipt {
  string message_id = 1;
  string reader_did = 2;
  ReceiptStatus status = 3;
  int64 timestamp = 4;
  bytes signature = 5;
}

// Read receipts (group messages — per-member, per-message)
message GroupReadReceipt {
  string message_id = 1;
  string group_id = 2;
  string reader_did = 3;
  ReceiptStatus status = 4;
  int64 timestamp = 5;
  bytes signature = 6;
}

enum ReceiptStatus {
  RECEIPT_STATUS_UNSPECIFIED = 0;
  RECEIPT_STATUS_DELIVERED = 1;
  RECEIPT_STATUS_READ = 2;
}

// Wrapper envelope for all MLS-encrypted group payloads.
//
// Enables multiplexing receipts, chat messages, and future payload types
// over the same GossipSub topic without byte-prefix hacks.
// The sender MLS-encrypts GroupPayload.encode_to_vec(); the receiver
// MLS-decrypts and dispatches on the oneof variant.
message GroupPayload {
  oneof payload {
    MessageContent message = 1;
    GroupReadReceipt receipt = 2;
  }
}

// Typing indicators
message TypingIndicator {
  string sender_did = 1;
  oneof recipient {
    string recipient_did = 2;
    string group_id = 3;
  }
  bool is_typing = 4;
  int64 timestamp = 5;
}

// Group chat structures
message Group {
  string id = 1;
  string name = 2;
  string admin_did = 3;
  repeated GroupMember members = 4;
  reserved 5;
  reserved "current_key";
  int64 created_at = 6;
  optional string avatar_cid = 7;
  optional string description = 8;
  bool frozen = 9;
}

message GroupMember {
  string did = 1;
  GroupRole role = 2;
  int64 joined_at = 3;
  optional string nickname = 4;
  reserved 5;
  reserved "x25519_key";
}

enum GroupRole {
  GROUP_ROLE_UNSPECIFIED = 0;
  GROUP_ROLE_MEMBER = 1;
  GROUP_ROLE_MODERATOR = 2;
  GROUP_ROLE_ADMIN = 3;
}

// GroupKey removed — MLS manages group key material internally.

message GroupInvitation {
  string group_id = 1;
  string group_name = 2;
  string inviter_did = 3;
  string invitee_did = 4;

  reserved 5, 7, 9;
  reserved "encrypted_group_key", "signature", "key_version";

  int64 timestamp = 6;

  // Full member list at time of invitation, so acceptor starts with correct state
  repeated GroupMember members = 8;

  // MLS Welcome message — TLS-serialized MlsMessageOut (Welcome variant).
  // The recipient joins via MlsGroupHandler::join_group_from_welcome().
  bytes mls_welcome = 10;

  // MLS commit — TLS-serialized MlsMessageOut (commit from add_members).
  // Existing group members process this to advance their epoch.
  bytes mls_commit = 11;
}

// ACK for direct message delivery confirmation.
// When error is set, the message was NOT delivered and the sender should retry
// (e.g. backpressure from rate limiting).
message DirectMessageAck {
  string message_id = 1;
  // Empty on success. Set to an error code (e.g. "rate_limited") on failure.
  optional string error = 2;
}

// Offline message relay
message OfflineMessageEnvelope {
  // Opaque 32-byte mailbox token (SHA-256 of recipient's signing key).
  // The relay never sees the recipient's DID — only this token.
  bytes mailbox_token = 1;
  oneof message {
    DirectMessage direct = 2;
    GroupMessage group = 3;
  }

  // Field 4 (relay_peer_id) removed — relay-internal metadata not needed by recipient.
  reserved 4;
  reserved "relay_peer_id";

  int64 stored_at = 5;   // needed for cursor-based pagination
  int64 expires_at = 6;  // needed for TTL enforcement by relay
}

message OfflineMessageRequest {
  // Opaque 32-byte mailbox token — SHA-256(verifying_key || "variance-mailbox-v1").
  bytes mailbox_token = 1;
  optional int64 since_timestamp = 2;  // Only messages after this
  uint32 limit = 3; // Max messages to fetch

  // Authentication: prove ownership of the mailbox.
  // verifying_key is the Ed25519 public key (32 bytes) whose SHA-256 produces the mailbox_token.
  // auth_signature signs (mailbox_token || auth_timestamp) with the corresponding signing key.
  bytes verifying_key = 4;        // 32-byte Ed25519 public key
  bytes auth_signature = 5;       // 64-byte Ed25519 signature
  int64 auth_timestamp = 6;       // Unix timestamp (seconds) for replay prevention
}

message OfflineMessageResponse {
  repeated OfflineMessageEnvelope messages = 1;
  bool has_more = 2;
  optional int64 next_cursor = 3;

  // Error handling: if error_code is present, this is an error response
  optional string error_code = 4;    // Error type: "storage_error", "invalid_request"
  optional string error_message = 5; // Human-readable error details
}

// ===== Group History Sync =====

// P2P request for missed group messages.
// Sent to an online group member after reconnecting.
message GroupSyncRequest {
  string group_id = 1;
  // Requester's DID (so responder can verify membership)
  string requester_did = 2;
  // Timestamp (ms) of the requester's newest stored message for this group.
  // The responder returns all messages with timestamp > since_timestamp.
  int64 since_timestamp = 3;
  // Max number of raw GroupMessage protos to return.
  uint32 limit = 4;
}

// Response carrying raw (MLS-encrypted) GroupMessage protos.
// The requester feeds each one through their local MLS state.
message GroupSyncResponse {
  repeated GroupMessage messages = 1;
  bool has_more = 2;
  // Set on error (e.g. requester not a member, no history)
  optional string error_code = 3;
  optional string error_message = 4;
}
