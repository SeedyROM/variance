syntax = "proto3";

package variance.media.v1;

// WebRTC signaling messages (sent over libp2p)
message SignalingMessage {
  string call_id = 1;
  string sender_did = 2;
  string recipient_did = 3;

  oneof message {
    Offer offer = 4;
    Answer answer = 5;
    ICECandidate ice_candidate = 6;
    CallControl control = 7;
  }

  int64 timestamp = 8;
  bytes signature = 9;
  bytes nonce = 10;  // 16 random bytes; prevents replay attacks
}

message Offer {
  string sdp = 1;
  CallType call_type = 2;
}

message Answer {
  string sdp = 1;
}

message ICECandidate {
  string candidate = 1;
  string sdp_mid = 2;
  optional uint32 sdp_m_line_index = 3;
}

message CallControl {
  CallControlType type = 1;
  optional string reason = 2;
}

enum CallType {
  CALL_TYPE_UNSPECIFIED = 0;
  CALL_TYPE_AUDIO = 1;
  CALL_TYPE_VIDEO = 2;
  CALL_TYPE_SCREEN_SHARE = 3;
}

enum CallControlType {
  CALL_CONTROL_TYPE_UNSPECIFIED = 0;
  CALL_CONTROL_TYPE_RING = 1;
  CALL_CONTROL_TYPE_ACCEPT = 2;
  CALL_CONTROL_TYPE_REJECT = 3;
  CALL_CONTROL_TYPE_HANGUP = 4;
  CALL_CONTROL_TYPE_MUTE_AUDIO = 5;
  CALL_CONTROL_TYPE_UNMUTE_AUDIO = 6;
  CALL_CONTROL_TYPE_ENABLE_VIDEO = 7;
  CALL_CONTROL_TYPE_DISABLE_VIDEO = 8;
}

// Call state
message CallState {
  string call_id = 1;
  repeated string participants = 2;  // DIDs
  CallType call_type = 3;
  CallStatus status = 4;
  int64 started_at = 5;
  optional int64 ended_at = 6;
}

enum CallStatus {
  CALL_STATUS_UNSPECIFIED = 0;
  CALL_STATUS_RINGING = 1;
  CALL_STATUS_CONNECTING = 2;
  CALL_STATUS_ACTIVE = 3;
  CALL_STATUS_ENDED = 4;
  CALL_STATUS_FAILED = 5;
}

// STUN/TURN server configuration
message ICEServer {
  repeated string urls = 1;
  optional string username = 2;
  optional string credential = 3;
}

message STUNTURNConfig {
  repeated ICEServer ice_servers = 1;
  optional uint32 ice_transport_policy = 2;
}

// SFU (Selective Forwarding Unit) messages for group calls
message SFUMessage {
  string session_id = 1;
  string participant_did = 2;

  oneof message {
    JoinRequest join = 3;
    LeaveNotification leave = 4;
    TrackUpdate track = 5;
    QualityUpdate quality = 6;
  }
}

message JoinRequest {
  string room_id = 1;
  repeated TrackInfo tracks = 2;
}

message LeaveNotification {
  string reason = 1;
}

message TrackInfo {
  string track_id = 1;
  TrackKind kind = 2;
  optional string label = 3;
}

enum TrackKind {
  TRACK_KIND_UNSPECIFIED = 0;
  TRACK_KIND_AUDIO = 1;
  TRACK_KIND_VIDEO = 2;
  TRACK_KIND_SCREEN = 3;
}

message TrackUpdate {
  string track_id = 1;
  bool enabled = 2;
}

message QualityUpdate {
  string track_id = 1;
  uint32 requested_bitrate = 2;
  optional VideoResolution resolution = 3;
}

message VideoResolution {
  uint32 width = 1;
  uint32 height = 2;
  uint32 framerate = 3;
}
